# All ruff hooks use 'local' repo to ensure we use the same ruff version
# as CI (from uv.lock), avoiding version mismatch surprises.
repos:
  - repo: local
    hooks:
      # Run ruff formatter (applies formatting)
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      # Run ruff linter with auto-fix
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: source_documents/cloud/redis-cloud-api-spec.json

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/unit/ -v
        language: system
        pass_filenames: false
        always_run: true

      - id: mkdocs-build
        name: mkdocs build (strict)
        entry: uv run mkdocs build --strict
        language: system
        pass_filenames: false
        files: ^(docs/|mkdocs\.yml)
