repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: source_documents/cloud/redis-cloud-api-spec.json

  - repo: local
    hooks:
      - id: ci-ruff-format-check
        name: ruff format check (ci parity)
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ci-ruff-check
        name: ruff check (ci parity)
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/unit/ -v
        language: system
        pass_filenames: false
        always_run: true

      - id: mkdocs-build
        name: mkdocs build (strict)
        entry: uv run mkdocs build --strict
        language: system
        pass_filenames: false
        files: ^(docs/|mkdocs\.yml)
