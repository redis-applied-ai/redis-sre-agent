display_name: Redis Cluster Health Check
preferred_entrypoint: SKILL.md
workflow_contract:
  required_tool_calls:
    - analyzer_get_package
    - analyzer_get_package_overview
    - analyzer_get_package_health_checks
    - analyzer_get_package_databases
    - analyzer_get_package_events
    - analyzer_get_package_alerts
    - analyzer_get_package_nodes
    - analyzer_get_package_topology
    - analyzer_get_package_time_series
    - analyzer_get_database_slowlog
  required_followups:
    - "Always fetch cluster-scope time series with interval=5m before finalizing the report."
    - "If the cluster view suggests node imbalance, fetch node-scope time series for the affected node before finalizing the report."
    - "When a Slowlog health check fires, fetch raw slowlog entries for the affected database before writing the finding."
    - "Prefer analyzer_get_package for an exact package id before relying on derived package context."
  progress_checklist:
    - "Resolve the package by exact id before relying on derived package context."
    - "Gather overview, health checks, databases, alerts, events, nodes, topology, and cluster time series."
    - "If cluster metrics suggest node imbalance, gather node-scope time series for the affected node."
    - "For each Slowlog finding, gather raw slowlog evidence and corroborating command stats before writing the report."
    - "Draft the report in the exact markdown skeleton required by the output contract."
    - "Run the validation checklist and repair the answer until every required heading and pattern is satisfied."
