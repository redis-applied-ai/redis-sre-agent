id: retrieval/versioned-memory-guidance-latest
name: Retrieval-only latest query honors version filtering
description: Retrieval suite version case should select the latest memory guidance from a versioned corpus pack.

provenance:
  source_kind: mixed
  source_pack: retrieval-curated
  source_pack_version: 2026-04-14
  derived_from:
    - memory-policy-latest
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/retrieval/versioned-memory-guidance-latest/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: agent_only
  agent: knowledge
  query: memory policy guidance
  max_tool_steps: 3
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: allow_zero_scope
    automation_mode: interactive

knowledge:
  mode: retrieval_only
  version: latest
  corpus:
    - ../../../corpora/retrieval-curated/2026-04-14

expectations:
  required_sources:
    - memory-policy-latest
