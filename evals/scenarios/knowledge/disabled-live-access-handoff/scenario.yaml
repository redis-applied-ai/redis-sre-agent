id: knowledge/disabled-live-access-handoff
name: Disabled knowledge mode removes startup and retrieval fixtures
description: Baseline ablation case with no pinned documents or retrieval corpus for the knowledge lane.

provenance:
  source_kind: synthetic
  source_pack: knowledge-ablation-curated
  source_pack_version: 2026-04-14
  derived_from:
    - knowledge-only-boundary
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/knowledge/disabled-live-access-handoff/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
