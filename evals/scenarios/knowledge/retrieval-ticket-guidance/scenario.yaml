id: knowledge/retrieval-ticket-guidance
name: Retrieval-only mode should surface ticket-backed maintenance guidance
description: Exercise retrieval_only knowledge mode so the answer is grounded in retrieved runbook and ticket evidence instead of pinned startup context.

provenance:
  source_kind: mixed
  source_pack: redis-docs-curated
  source_pack_version: 2026-04-01
  derived_from:
    - redis_sre_agent.agent.knowledge_agent.KNOWLEDGE_SYSTEM_PROMPT
    - evals/corpora/redis-docs-curated/2026-04-01/documents/maintenance-mode-guidance.md
    - evals/corpora/redis-docs-curated/2026-04-01/tickets/RET-5032.yaml
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/knowledge/retrieval-ticket-guidance/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: agent_only
  agent: knowledge_only
  query: >
    A maintenance window caused failover churn after the operator skipped replica verification.
    What documented guidance should I follow?
  max_tool_steps: 4
  llm_mode: replay

knowledge:
  mode: retrieval_only
  version: latest
  corpus:
    - ../../../corpora/redis-docs-curated/2026-04-01

expectations:
  required_findings:
    - verify replica health before maintenance changes
    - use documented maintenance guidance rather than generic oss advice
  forbidden_claims:
    - restart redis first
  required_sources:
    - maintenance-mode-guidance
    - RET-5032
