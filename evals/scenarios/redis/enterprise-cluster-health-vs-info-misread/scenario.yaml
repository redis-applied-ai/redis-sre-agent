id: redis/enterprise-cluster-health-vs-info-misread
name: Cluster health should not be inferred from a single INFO view
description: Exercise the production full_turn triage lane against a Redis Enterprise cluster where a single database resync should not be misread as whole-cluster failure.

provenance:
  source_kind: mixed
  source_pack: redis-docs-curated
  source_pack_version: 2026-04-01
  derived_from:
    - redis_sre_agent.agent.chat_agent.CHAT_SYSTEM_PROMPT
    - evals/corpora/redis-docs-curated/2026-04-01/documents/cluster-health-triage.md
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/redis/enterprise-cluster-health-vs-info-misread/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: full_turn
  agent: redis_triage
  route_via_router: false
  query: >
    One shard in the attached Redis Enterprise cluster is resyncing, but I need to know whether
    the cluster itself is unhealthy. What evidence should drive that answer?
  max_tool_steps: 5
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: require_target
    automation_mode: interactive
  target_catalog:
    - handle: tgt_cluster_checkout_global
      kind: cluster
      display_name: checkout-global enterprise cluster
      resource_id: re-cluster-checkout-global
      cluster_type: redis_enterprise
      capabilities: [admin, diagnostics, knowledge]
      public_metadata:
        environment: production
        deployment: redis_enterprise
  bound_targets:
    - tgt_cluster_checkout_global

knowledge:
  mode: full
  version: latest
  corpus:
    - ../../../corpora/redis-docs-curated/2026-04-01

tools:
  redis_enterprise_admin:
    get_cluster_info:
      description: Fetch cluster-wide health state.
      result: fixtures/tools/get-cluster-info.json
    list_databases:
      description: Fetch database inventory and current status.
      result: fixtures/tools/list-databases.json

expectations:
  required_tool_calls:
    - provider_family: redis_enterprise_admin
      operation: get_cluster_info
      target_handle: tgt_cluster_checkout_global
    - provider_family: redis_enterprise_admin
      operation: list_databases
      target_handle: tgt_cluster_checkout_global
  forbidden_tool_calls:
    - provider_family: redis_command
      operation: info
  required_findings:
    - use cluster-admin health evidence instead of a single database info view
    - one resyncing database does not necessarily mean the whole cluster is unhealthy
  forbidden_claims:
    - the whole cluster is down
  required_sources:
    - cluster-health-triage
    - maintenance-mode-guidance
  expected_routing_decision: triage
