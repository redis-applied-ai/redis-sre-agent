id: redis/memory-pressure-oss
name: OSS memory pressure on attached cache
description: Exercise the production full_turn chat lane against a single OSS cache showing evictions and fragmentation.

provenance:
  source_kind: mixed
  source_pack: redis-docs-curated
  source_pack_version: 2026-04-01
  derived_from:
    - redis_sre_agent.agent.chat_agent.CHAT_SYSTEM_PROMPT
    - evals/corpora/redis-docs-curated/2026-04-01/documents/memory-pressure-runbook.md
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/redis/memory-pressure-oss/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: full_turn
  agent: redis_chat
  route_via_router: false
  query: >
    The attached orders cache is evicting keys and latency just spiked. What would you check
    first, and avoid jumping straight to config changes unless the evidence supports it.
  max_tool_steps: 4
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: require_target
    automation_mode: interactive
  target_catalog:
    - handle: tgt_instance_orders_cache
      kind: instance
      display_name: prod orders cache
      resource_id: redis-prod-orders
      cluster_type: oss_single
      capabilities: [diagnostics, knowledge]
      public_metadata:
        environment: production
        deployment: oss
  bound_targets:
    - tgt_instance_orders_cache

knowledge:
  mode: full
  version: latest
  pinned_documents:
    - ../../../corpora/redis-docs-curated/2026-04-01/documents/memory-pressure-runbook.md
  corpus:
    - ../../../corpora/redis-docs-curated/2026-04-01

tools:
  redis_command:
    info:
      description: Fetch Redis INFO sections for the attached instance.
      responders:
        - when:
            args_contains:
              section: memory
          result: fixtures/tools/info-memory.json
        - when:
            args_contains:
              section: replication
          result: fixtures/tools/info-replication.json
    memory_stats:
      description: Fetch MEMORY STATS output for the attached instance.
      result: fixtures/tools/memory-stats.json

expectations:
  required_tool_calls:
    - provider_family: redis_command
      operation: info
      target_handle: tgt_instance_orders_cache
    - provider_family: redis_command
      operation: memory_stats
      target_handle: tgt_instance_orders_cache
  forbidden_tool_calls:
    - provider_family: redis_command
      operation: config_set
      target_handle: tgt_instance_orders_cache
  required_findings:
    - memory pressure is driving the evictions
    - explain the evidence before suggesting configuration changes
  forbidden_claims:
    - set maxmemory-policy immediately
  required_sources:
    - memory-pressure-runbook
    - evidence-first-triage
  expected_routing_decision: chat
