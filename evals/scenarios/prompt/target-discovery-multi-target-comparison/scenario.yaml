id: prompt/target-discovery-multi-target-comparison
name: Target discovery multi target comparison
description: Evaluate whether the agent resolves and preserves a multi-target set, then compares live diagnostics per target instead of collapsing to one cache.
provenance:
  source_kind: synthetic
  source_pack: prompt-core
  source_pack_version: 2026-04-14
  derived_from:
    - redis_sre_agent.agent.chat_agent.CHAT_SYSTEM_PROMPT
    - specs/natural-language-target-discovery-spec.md
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/prompt/target-discovery-multi-target-comparison/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: full_turn
  agent: redis_chat
  route_via_router: false
  query: >
    Compare the prod checkout cache and prod session cache for memory pressure
    right now. Resolve both targets from the natural-language names if needed,
    inspect live Redis state for each one, and tell me which cache is closer to
    maxmemory.
  max_tool_steps: 7
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: allow_zero_scope
    automation_mode: interactive
  target_catalog:
    - handle: tgt_checkout_cache_prod
      kind: instance
      display_name: prod checkout cache
      resource_id: redis-prod-checkout-cache
      capabilities:
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        target_type: oss_single
        aliases:
          - checkout cache
          - prod checkout cache
    - handle: tgt_session_cache_prod
      kind: instance
      display_name: prod session cache
      resource_id: redis-prod-session-cache
      capabilities:
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        target_type: oss_single
        aliases:
          - session cache
          - prod session cache

knowledge:
  mode: full
  version: latest
  pinned_documents:
    - ../../_shared/startup/live-system-boundary.md
    - ../../_shared/startup/policies/target-discovery-before-live-access.md
  corpus:
    - ../../../corpora/prompt-core/2026-04-14

tools:
  redis_command:
    info:
      description: Fetch Redis INFO memory for each discovered cache.
      input_schema:
        type: object
        properties:
          section:
            type: string
      target_overrides:
        tgt_checkout_cache_prod:
          responders:
            - when:
                args_contains:
                  section: memory
              result: fixtures/tools/info-checkout-memory.json
        tgt_session_cache_prod:
          responders:
            - when:
                args_contains:
                  section: memory
              result: fixtures/tools/info-session-memory.json

expectations:
  required_tool_calls:
    - provider_family: target_discovery
      operation: resolve_redis_targets
    - provider_family: redis_command
      operation: info
      target_handle: tgt_checkout_cache_prod
    - provider_family: redis_command
      operation: info
      target_handle: tgt_session_cache_prod
  required_findings:
    - prod checkout cache
    - prod session cache
    - prod session cache is closer to maxmemory
  required_sources:
    - live-system-boundary
    - target-discovery-before-live-access
  expected_routing_decision: chat
