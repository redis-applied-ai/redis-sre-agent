id: prompt/target-discovery-cluster-database-list
name: Target discovery cluster database list
description: Exercise discovery-first resolution for a natural-language enterprise cluster reference, then list cluster databases through attached admin tooling.
provenance:
  source_kind: synthetic
  source_pack: prompt-core
  source_pack_version: 2026-04-14
  derived_from:
    - redis_sre_agent.agent.chat_agent.CHAT_SYSTEM_PROMPT
    - specs/natural-language-target-discovery-spec.md
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/prompt/target-discovery-cluster-database-list/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: full_turn
  agent: redis_chat
  route_via_router: false
  query: >
    On the payments east enterprise cluster, what Redis databases can you connect
    to right now? Resolve the target from the natural-language name if needed and
    answer from live admin data.
  max_tool_steps: 6
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: allow_zero_scope
    automation_mode: interactive
  target_catalog:
    - handle: tgt_payments_east_cluster
      kind: cluster
      display_name: payments east enterprise cluster
      resource_id: cluster-payments-east
      cluster_type: redis_enterprise
      capabilities:
        - admin
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        aliases:
          - payments east cluster
          - payments-east
          - payments east enterprise cluster
    - handle: tgt_checkout_west_cluster
      kind: cluster
      display_name: checkout west enterprise cluster
      resource_id: cluster-checkout-west
      cluster_type: redis_enterprise
      capabilities:
        - admin
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        aliases:
          - checkout west cluster
          - checkout-west

knowledge:
  mode: full
  version: latest
  pinned_documents:
    - ../../_shared/startup/live-system-boundary.md
    - ../../_shared/startup/policies/target-discovery-before-live-access.md
  corpus:
    - ../../../corpora/prompt-core/2026-04-14

tools:
  re_admin:
    list_databases:
      description: List Redis Enterprise databases for the discovered cluster.
      result: fixtures/tools/list-databases.json

expectations:
  required_tool_calls:
    - provider_family: target_discovery
      operation: resolve_redis_targets
    - provider_family: redis_enterprise_admin
      operation: list_databases
  required_findings:
    - payments-cache-prod
    - payments-ledger-prod
  required_sources:
    - live-system-boundary
    - target-discovery-before-live-access
  expected_routing_decision: chat
