id: prompt/target-discovery-known-targets-then-connect
name: Target discovery known targets then connect
description: Evaluate whether the agent can enumerate the safe target inventory, then resolve one named cluster and answer from attached live admin data in the same turn.
provenance:
  source_kind: synthetic
  source_pack: prompt-core
  source_pack_version: 2026-04-14
  derived_from:
    - redis_sre_agent.agent.chat_agent.CHAT_SYSTEM_PROMPT
    - specs/natural-language-target-discovery-spec.md
  synthetic:
    is_synthetic: false
  golden:
    expectation_basis: human_authored
    exemplar_sources:
      - evals/goldens/prompt/target-discovery-known-targets-then-connect/expected.md
    review_status: reviewed
    reviewed_by: sre-evals

execution:
  lane: full_turn
  agent: redis_chat
  route_via_router: false
  query: >
    What Redis targets do you know about right now, and on the payments east
    enterprise cluster what Redis databases can you connect to? List the known
    targets from your own target inventory first, then resolve the cluster and
    answer from live admin data.
  max_tool_steps: 7
  llm_mode: replay

scope:
  turn_scope:
    resolution_policy: allow_zero_scope
    automation_mode: interactive
  target_catalog:
    - handle: tgt_checkout_cache_prod
      kind: instance
      display_name: prod checkout cache
      resource_id: redis-prod-checkout-cache
      capabilities:
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        target_type: oss_single
    - handle: tgt_session_cache_prod
      kind: instance
      display_name: prod session cache
      resource_id: redis-prod-session-cache
      capabilities:
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        target_type: oss_single
    - handle: tgt_payments_east_cluster
      kind: cluster
      display_name: payments east enterprise cluster
      resource_id: cluster-payments-east
      cluster_type: redis_enterprise
      capabilities:
        - admin
        - diagnostics
      public_metadata:
        environment: production
        usage: cache
        status: healthy
        aliases:
          - payments east cluster
          - payments-east

knowledge:
  mode: full
  version: latest
  pinned_documents:
    - ../../_shared/startup/live-system-boundary.md
    - ../../_shared/startup/policies/target-discovery-before-live-access.md
  corpus:
    - ../../../corpora/prompt-core/2026-04-14

tools:
  re_admin:
    list_databases:
      description: List Redis Enterprise databases for the discovered cluster.
      result: fixtures/tools/list-databases.json

expectations:
  required_tool_calls:
    - provider_family: target_discovery
      operation: list_known_redis_targets
    - provider_family: target_discovery
      operation: resolve_redis_targets
    - provider_family: redis_enterprise_admin
      operation: list_databases
      target_handle: tgt_payments_east_cluster
  required_findings:
    - prod checkout cache
    - prod session cache
    - payments east enterprise cluster
    - payments-cache-prod
    - payments-ledger-prod
  required_sources:
    - live-system-boundary
    - target-discovery-before-live-access
  expected_routing_decision: chat
