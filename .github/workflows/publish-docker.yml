name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'
      push_latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false
      build_airgap:
        description: 'Build air-gap image'
        required: false
        type: boolean
        default: true
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove bulky directories from workspace
        run: |
          echo "Before cleanup:" && df -h
          rm -rf htmlcov site eval_reports artifacts artifacts_tmp_for_test _tmp_artifacts redis-docs/build \
                 ui/node_modules ui/ui-kit
          echo "After cleanup:" && df -h

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prune Docker disk space
        run: |
          docker builder prune -af || true
          docker system prune -af || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            redislabs/redis-sre-agent
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true' }}
            type=sha,prefix=sha-

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # Effectively free up ~30GB of space
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=redislabs/redis-sre-agent:buildcache
          cache-to: type=registry,ref=redislabs/redis-sre-agent:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  publish-knowledge-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      packages: write
    services:
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.7"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Set release metadata
        run: |
          echo "RELEASE_TAG=${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}" >> "$GITHUB_ENV"
          echo "REPO_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "BATCH_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Prepare release corpus artifacts
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          uv run redis-sre-agent pipeline prepare-sources \
            --batch-date "$BATCH_DATE" \
            --prepare-only \
            --artifacts-path ./artifacts
          uv run redis-sre-agent pipeline scrape \
            --batch-date "$BATCH_DATE" \
            --artifacts-path ./artifacts \
            --scrapers redis_docs_local,redis_kb,redis_cloud_api \
            --latest-only \
            --docs-path ./redis-docs

      - name: Ingest release corpus with default embeddings
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_PROVIDER: openai
          EMBEDDING_MODEL: text-embedding-3-small
          VECTOR_DIM: 1536
        run: |
          uv run redis-sre-agent pipeline ingest \
            --batch-date "$BATCH_DATE" \
            --artifacts-path ./artifacts \
            --latest-only

      - name: Build standard knowledge pack
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_PROVIDER: openai
          EMBEDDING_MODEL: text-embedding-3-small
          VECTOR_DIM: 1536
        run: |
          mkdir -p dist
          uv run redis-sre-agent knowledge-pack build \
            --batch-date "$BATCH_DATE" \
            --artifacts-path ./artifacts \
            --output "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}.zip" \
            --release-tag "$RELEASE_TAG" \
            --repo-sha "$REPO_SHA" \
            --scrapers-run source_documents,redis_docs_local,redis_kb,redis_cloud_api \
            --profile runtime

      - name: Ingest release corpus with air-gap embeddings
        env:
          REDIS_URL: redis://127.0.0.1:6379/1
          EMBEDDING_PROVIDER: local
          EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
          VECTOR_DIM: 384
        run: |
          uv run redis-sre-agent pipeline ingest \
            --batch-date "$BATCH_DATE" \
            --artifacts-path ./artifacts \
            --latest-only

      - name: Build air-gap knowledge pack
        env:
          REDIS_URL: redis://127.0.0.1:6379/1
          EMBEDDING_PROVIDER: local
          EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
          VECTOR_DIM: 384
        run: |
          uv run redis-sre-agent knowledge-pack build \
            --batch-date "$BATCH_DATE" \
            --artifacts-path ./artifacts \
            --output "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}-airgap.zip" \
            --release-tag "$RELEASE_TAG" \
            --repo-sha "$REPO_SHA" \
            --scrapers-run source_documents,redis_docs_local,redis_kb,redis_cloud_api \
            --profile airgap

      - name: Smoke-test knowledge pack restores
        run: |
          uv run redis-sre-agent knowledge-pack inspect \
            --pack "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}.zip"
          REDIS_URL=redis://127.0.0.1:6379/2 \
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          EMBEDDING_PROVIDER=openai \
          EMBEDDING_MODEL=text-embedding-3-small \
          VECTOR_DIM=1536 \
          uv run redis-sre-agent knowledge-pack load \
            --pack "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}.zip" \
            --mode restore \
            --artifacts-path ./artifacts \
            --json
          EMBEDDING_PROVIDER=local \
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2 \
          VECTOR_DIM=384 \
          uv run redis-sre-agent knowledge-pack inspect \
            --pack "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}-airgap.zip"
          REDIS_URL=redis://127.0.0.1:6379/3 \
          EMBEDDING_PROVIDER=local \
          EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2 \
          VECTOR_DIM=384 \
          uv run redis-sre-agent knowledge-pack load \
            --pack "dist/redis-sre-agent-knowledge-pack-${RELEASE_TAG}-airgap.zip" \
            --mode restore \
            --artifacts-path ./artifacts \
            --json

      - name: Upload knowledge-pack workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-packs-${{ env.RELEASE_TAG }}
          path: dist/*.zip

      - name: Upload knowledge packs to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist/*.zip --clobber

  publish-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for UI image
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: |
            redislabs/redis-sre-agent-ui
            ghcr.io/${{ github.repository_owner }}/redis-sre-agent-ui
          tags: |
            type=raw,value=${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true' }}
            type=sha,prefix=sha-

      - name: Build and push UI Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=registry,ref=redislabs/redis-sre-agent-ui:buildcache
          cache-to: type=registry,ref=redislabs/redis-sre-agent-ui:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: UI image digest
        run: echo ${{ steps.meta-ui.outputs.digest }}

  publish-airgap:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: ${{ github.event_name == 'release' || github.event.inputs.build_airgap == 'true' }}

    steps:
      # Free disk space FIRST before anything else
      # The air-gap image is ~4GB and needs significant space for multi-arch builds
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove bulky directories from workspace
        run: |
          echo "Before cleanup:" && df -h
          rm -rf htmlcov site eval_reports artifacts artifacts_tmp_for_test _tmp_artifacts redis-docs/build \
                 ui/node_modules ui/ui-kit redis-docs source_documents
          echo "After cleanup:" && df -h

      - name: Additional disk cleanup
        run: |
          # Remove more unnecessary files for air-gap build
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/share/swift
          sudo apt-get clean
          df -h

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prune Docker disk space
        run: |
          docker builder prune -af || true
          docker system prune -af || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for air-gap image
        id: meta-airgap
        uses: docker/metadata-action@v5
        with:
          images: |
            redislabs/redis-sre-agent
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ (github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag) }}-airgap
            type=raw,value=airgap,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=airgap,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true' }}

      - name: Build and push air-gap Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.airgap
          push: true
          tags: ${{ steps.meta-airgap.outputs.tags }}
          labels: ${{ steps.meta-airgap.outputs.labels }}
          # Only import cache, don't export - air-gap image is too large (~5GB with models)
          # and cache export runs out of disk space on GitHub runners
          cache-from: type=registry,ref=redislabs/redis-sre-agent:buildcache-airgap
          platforms: linux/amd64,linux/arm64

      - name: Air-gap image digest
        run: echo ${{ steps.meta-airgap.outputs.digest }}

  publish-ui-airgap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'release' || github.event.inputs.build_airgap == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for air-gap UI image
        id: meta-ui-airgap
        uses: docker/metadata-action@v5
        with:
          images: |
            redislabs/redis-sre-agent-ui
            ghcr.io/${{ github.repository_owner }}/redis-sre-agent-ui
          tags: |
            type=raw,value=${{ (github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag) }}-airgap
            type=raw,value=airgap,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=airgap,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true' }}

      - name: Build and push air-gap UI Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-ui-airgap.outputs.tags }}
          labels: ${{ steps.meta-ui-airgap.outputs.labels }}
          cache-from: type=registry,ref=redislabs/redis-sre-agent-ui:buildcache
          platforms: linux/amd64,linux/arm64

      - name: Air-gap UI image digest
        run: echo ${{ steps.meta-ui-airgap.outputs.digest }}
