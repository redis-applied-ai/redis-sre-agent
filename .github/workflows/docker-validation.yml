name: Docker Validation

on:
  push:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-validation.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "monitoring/**"
      - "pyproject.toml"
      - "uv.lock"
      - "redis_sre_agent/**"
      - "ui/**"
      - "ui/.dockerignore"
  pull_request:
    branches: [main]
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-validation.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "monitoring/**"
      - "pyproject.toml"
      - "uv.lock"
      - "redis_sre_agent/**"
      - "ui/**"
      - "ui/.dockerignore"

permissions:
  contents: read

jobs:
  backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Build root Docker image
        run: docker build -f Dockerfile .

  frontend-image:
    name: Build UI image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build UI Docker image
        run: docker build -f ui/Dockerfile ui

  compose-smoke:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-image
      - frontend-image
    timeout-minutes: 45

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Create CI env file
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(".env").write_text(
              "\n".join(
                  [
                      "OPENAI_API_KEY=",
                      f"REDIS_SRE_MASTER_KEY={base64.b64encode(os.urandom(32)).decode()}",
                      "",
                  ]
              )
          )
          PY

      - name: Install UI test dependencies
        working-directory: ui
        run: npm ci --ignore-scripts

      - name: Install Playwright browser
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Start smoke stack
        run: docker compose up -d --build sre-worker sre-ui

      - name: Wait for API health
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/tmp/api-health.json; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 5
          done

          echo "API health never became ready"
          exit 1

      - name: Run smoke UI check
        working-directory: ui
        env:
          API_BASE_URL: http://127.0.0.1:8080/api/v1
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3002
          PLAYWRIGHT_USE_EXISTING_SERVER: "1"
        run: npx playwright test e2e/health.spec.ts --project=chromium

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --tail=200 sre-agent sre-worker sre-ui

      - name: Tear down smoke stack
        if: always()
        run: docker compose down -v
