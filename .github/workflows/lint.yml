name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.5.7"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --dev

    # These commands use the same ruff version as local dev (from uv.lock)
    # Local pre-commit formats/fixes; CI only checks (no auto-fix)
    - name: Check formatting (ruff format)
      run: uv run ruff format --check .

    - name: Check linting (ruff check)
      run: uv run ruff check .
