name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deterministic-evals:
    name: Deterministic eval subset
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.5.7"
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --dev

    - name: Run deterministic eval subset
      run: make test-eval-pr

  live-evals-pr:
    name: Live evals (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - deterministic-evals
      - test

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.5.7"
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --dev

    - name: Run PR live eval suite
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      run: make test-eval-pr-live EVAL_PR_LIVE_TRIGGER="${{ github.event_name }}"

    - name: Upload PR live eval artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pr-live-evals
        path: artifacts/pr-live-evals

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.5.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Generate and check reference docs
      run: |
        uv run python scripts/generate_reference_docs.py
        git diff --exit-code -- docs/reference || (echo "::error::Reference docs out of date. Run: uv run python scripts/generate_reference_docs.py and commit changes."; exit 1)

    - name: Docs snippet checks
      run: uv run pytest -q tests/test_docs_snippets.py
    - name: Run unit tests
      run: uv run pytest tests/unit/ -v --cov=redis_sre_agent --cov-report=xml --cov-report=term-missing

# Too slow to run in CI at the moment. Disabling for now.
#    - name: Run integration tests
#      run: uv run pytest tests/integration -m "integration and not slow" -v --run-api-tests
#      env:
#        CI: true
#        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
