site_name: Redis SRE Agent
site_description: Production-ready Redis SRE agent with LangGraph, FastAPI, and monitoring.
repo_url: https://github.com/redis-applied-ai/redis-sre-agent
repo_name: redis-applied-ai/redis-sre-agent

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: red
      accent: deep-orange

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight
  - pymdownx.inlinehilite

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - User Guide:
      - Local quick start: user_guide/01_local_quickstart.md
      - End-to-end setup: user_guide/02_end_to_end.md
      - VM deployment: user_guide/03_vm_deployment.md
      - How-to:
          - Agent Memory Server Integration: user_guide/how_to_guides/agent_memory_integration.md
          - How to connect to Redis: user_guide/how_to_guides/connect_to_redis.md
          - Configuration: user_guide/how_to_guides/configuration.md
          - Eval system: user_guide/how_to_guides/evals.md
          - Tool Providers: user_guide/how_to_guides/tool_providers.md
          - CLI workflows: user_guide/how_to_guides/cli_workflows.md
          - API workflows: user_guide/how_to_guides/api_workflows.md
          - Local development & testing: user_guide/how_to_guides/local_dev.md
          - Pipelines & ingestion: user_guide/how_to_guides/pipelines.md
          - Source document features: user_guide/how_to_guides/source_documents.md
          - Scheduling flows: user_guide/how_to_guides/scheduling.md
          - Release tutorials:
              - v0.2.8 release tutorial: user_guide/how_to_guides/release_tutorials/v0_2_8.md
          - Operations:
              - Docker Deployment: user_guide/how_to_guides/operations/docker_deployment.md
              - Air-Gap Deployment: user_guide/how_to_guides/operations/airgap.md
              - Observability & Health: user_guide/how_to_guides/operations/observability.md
              - Operational Notes & Limitations: user_guide/how_to_guides/operations/gotchas.md
  - Concepts:
      - Overview: concepts/core.md
  - API Reference:
      - CLI Reference: api/cli_ref.md
      - REST API: api/rest_api.md
      - Configuration: api/configuration.md
