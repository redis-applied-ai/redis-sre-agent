site_name: Redis SRE Agent
site_description: Production-ready Redis SRE agent with LangGraph, FastAPI, and monitoring.
repo_url: https://github.com/redis-applied-ai/redis-sre-agent
repo_name: redis-applied-ai/redis-sre-agent

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: red
      accent: deep-orange

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight
  - pymdownx.inlinehilite

plugins:
  - search
  - autorefs
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: table
            inherited_members: true
            filters:
              - "!^_"

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Concepts:
      - concepts/index.md
      - Core architecture: concepts/core.md
      - Triage loop: concepts/triage_loop.md
      - Pipelines: concepts/pipelines.md
      - Tool providers: concepts/tool_providers.md
  - User Guide:
      - user_guide/index.md
      - Local quick start: user_guide/01_local_quickstart.md
      - End-to-end walkthrough: user_guide/02_end_to_end.md
      - VM deployment: user_guide/03_vm_deployment.md
      - How-To Guides:
          - user_guide/how_to_guides/index.md
          - Connect to Redis: user_guide/how_to_guides/connect_to_redis.md
          - Configuration: user_guide/how_to_guides/configuration.md
          - Local development: user_guide/how_to_guides/local_dev.md
          - CLI workflows: user_guide/how_to_guides/cli_workflows.md
          - API workflows: user_guide/how_to_guides/api_workflows.md
          - Tool providers: user_guide/how_to_guides/tool_providers.md
          - Pipelines: user_guide/how_to_guides/pipelines.md
          - Source documents: user_guide/how_to_guides/source_documents.md
          - Scheduling: user_guide/how_to_guides/scheduling.md
          - Evals: user_guide/how_to_guides/evals.md
          - Agent memory integration: user_guide/how_to_guides/agent_memory_integration.md
          - Web UI: user_guide/how_to_guides/ui.md
          - Operations:
              - user_guide/how_to_guides/operations/index.md
              - Docker deployment: user_guide/how_to_guides/operations/docker_deployment.md
              - Observability: user_guide/how_to_guides/operations/observability.md
              - Airgap: user_guide/how_to_guides/operations/airgap.md
              - Secret encryption: user_guide/how_to_guides/operations/encryption.md
              - Gotchas: user_guide/how_to_guides/operations/gotchas.md
          - Release tutorials:
              - user_guide/how_to_guides/release_tutorials/index.md
              - v0.2.8: user_guide/how_to_guides/release_tutorials/v0_2_8.md
  - Examples:
      - examples/index.md
      - Incident triage: examples/incident_triage.md
      - Custom provider: examples/custom_provider.md
  - API Reference:
      - api/index.md
      - REST API: api/rest_api.md
      - CLI reference: api/cli_ref.md
      - Configuration: api/configuration.md
      - Python package:
          - api/python/index.md
          - Agent: api/python/agent.md
          - Core: api/python/core.md
          - API server: api/python/api.md
          - CLI: api/python/cli.md
          - MCP server: api/python/mcp_server.md
          - Pipelines: api/python/pipelines.md
          - Skills: api/python/skills.md
          - Targets: api/python/targets.md
          - Tools: api/python/tools.md
          - Evaluation: api/python/evaluation.md
          - Observability: api/python/observability.md
